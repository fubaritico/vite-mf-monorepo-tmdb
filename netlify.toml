# ============================================================================
# Netlify Configuration - Monorepo Root
# ============================================================================
# Using GitHub Actions + netlify-cli for deployments (--no-build flag)
# No [build] sections needed as we pre-build before deploying
# ============================================================================

# CORS headers — required for Module Federation remotes
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Netlify Image CDN — enable format conversion for remote TMDB images
[images]
  remote_images = ["https://image.tmdb.org/.*"]

# SPA routing — redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
