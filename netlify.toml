# ============================================================================
# Netlify Configuration - Monorepo Root
# ============================================================================
# This is the main netlify.toml at the root of the monorepo.
# Each Netlify site will use this file with different base directories.
# ============================================================================

[[build]]
  base = "apps/host"
  publish = "dist"

[[build]]
  base = "apps/home"
  publish = "dist"

[[build]]
  base = "apps/media"
  publish = "dist"

[[build]]
  base = "apps/photos"
  publish = "dist"

[[build]]
  base = "packages/storybook"
  publish = "storybook-static"

# Node.js and pnpm versions (applies to all sites)
[build.environment]
  NODE_VERSION = "22.11.0"
  PNPM_VERSION = "10.8.1"
  NPM_FLAGS = "--legacy-peer-deps"

# CORS headers — required for Module Federation remotes
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Netlify Image CDN — enable format conversion for remote TMDB images
[images]
  remote_images = ["https://image.tmdb.org/.*"]

# SPA routing — redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
