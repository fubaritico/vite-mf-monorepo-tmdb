name: Deploy Home to Netlify

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - uses: ./.github/actions/setup

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.workflow_run.head_sha }}^
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            app:
              - 'apps/home/**'
            packages:
              - 'packages/**'

      - name: Debug filters
        run: |
          echo "app changed: ${{ steps.filter.outputs.app }}"
          echo "packages changed: ${{ steps.filter.outputs.packages }}"

      - name: Build
        if: steps.filter.outputs.app == 'true' || steps.filter.outputs.packages == 'true'
        run: pnpm prod

      - name: Install Netlify CLI
        if: steps.filter.outputs.app == 'true' || steps.filter.outputs.packages == 'true'
        run: pnpm install -g netlify-cli

      - name: Deploy to Netlify (Production)
        if: steps.filter.outputs.app == 'true' || steps.filter.outputs.packages == 'true'
        run: netlify deploy --prod --dir=apps/home/dist --site=$NETLIFY_SITE_ID_HOME --no-build --cwd apps/home --message "$DEPLOY_MESSAGE"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_HOME: ${{ secrets.NETLIFY_SITE_ID_HOME }}
          DEPLOY_MESSAGE: "${{ github.event.workflow_run.head_commit.message }} (${{ github.event.workflow_run.head_sha }})"
