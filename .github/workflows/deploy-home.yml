name: Deploy Home to Netlify

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Check if files changed
        id: changed
        run: |
          if git diff --quiet ${{ github.event.workflow_run.before }} ${{ github.event.workflow_run.head_sha }} -- apps/home/ packages/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: pnpm prod

      - name: Install Netlify CLI
        run: pnpm install -g netlify-cli

      - name: Deploy to Netlify (Production)
        if: steps.changed.outputs.changed == 'true'
        run: netlify deploy --prod --dir=apps/home/dist --site=$NETLIFY_SITE_ID_HOME --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_HOME: ${{ secrets.NETLIFY_SITE_ID_HOME }}
