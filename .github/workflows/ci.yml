name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  type-check:
    uses: ./.github/workflows/type-check.yml

  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [lint, type-check, test]
    uses: ./.github/workflows/build.yml

  sonarqube:
    uses: ./.github/workflows/sonarqube.yml

  quality-gate:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build, sonarqube]
    if: always()
    steps:
      - name: Check all checks passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Quality gate failed"
            exit 1
          fi
          echo "✅ All checks passed"

  deploy:
    name: Trigger Netlify Deploys
    needs: [quality-gate, sonarqube]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify builds (all 5 apps)
        run: |
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_HOST }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_HOME }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_MEDIA }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_PHOTOS }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_STORYBOOK }}"
