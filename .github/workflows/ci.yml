name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  sonarqube:
    needs: [validate]
    uses: ./.github/workflows/sonarqube.yml
    secrets: inherit

  quality-gate:
    runs-on: ubuntu-latest
    needs: [validate, sonarqube]
    if: always()
    steps:
      - name: Check all checks passed
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.sonarqube.result }}" != "success" ]; then
            echo "❌ Quality gate failed"
            exit 1
          fi
          echo "✅ All checks passed"

  deploy:
    name: Trigger Netlify Deploys
    needs: [quality-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if this is a publish commit
        id: is_publish
        run: |
          MESSAGE=$(git log -1 --pretty=%B)
          if [[ "$MESSAGE" == *"update changelog"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Netlify builds (all 5 apps)
        if: steps.is_publish.outputs.skip == 'false'
        run: |
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_HOST }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_HOME }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_MEDIA }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_PHOTOS }}"
          curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_STORYBOOK }}"
