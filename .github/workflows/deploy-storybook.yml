name: Deploy Storybook to Netlify

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Get parent SHA
        id: parent
        run: |
          PARENT_SHA=$(curl -s "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["parents"][0]["sha"])')
          echo "sha=$PARENT_SHA" >> $GITHUB_OUTPUT

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.parent.outputs.sha }}
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            storybook:
              - 'packages/storybook/**'
            ui:
              - 'packages/ui/**'
            layouts:
              - 'packages/layouts/**'

      - name: Debug filters
        run: |
          echo "storybook changed: ${{ steps.filter.outputs.storybook }}"
          echo "ui changed: ${{ steps.filter.outputs.ui }}"
          echo "layouts changed: ${{ steps.filter.outputs.layouts }}"

      - name: Build Storybook
        if: steps.filter.outputs.storybook == 'true' || steps.filter.outputs.ui == 'true' || steps.filter.outputs.layouts == 'true'
        run: pnpm --filter @vite-mf-monorepo/storybook build

      - name: Install Netlify CLI
        if: steps.filter.outputs.storybook == 'true' || steps.filter.outputs.ui == 'true' || steps.filter.outputs.layouts == 'true'
        run: pnpm install -g netlify-cli

      - name: Deploy to Netlify (Production)
        if: steps.filter.outputs.storybook == 'true' || steps.filter.outputs.ui == 'true' || steps.filter.outputs.layouts == 'true'
        run: netlify deploy --prod --dir=packages/storybook/storybook-static --site=$NETLIFY_SITE_ID_STORYBOOK --no-build --cwd packages/storybook --message "$DEPLOY_MESSAGE"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_STORYBOOK: ${{ secrets.NETLIFY_SITE_ID_STORYBOOK }}
          DEPLOY_MESSAGE: "${{ github.event.workflow_run.head_commit.message }} (${{ github.event.workflow_run.head_sha }})"
