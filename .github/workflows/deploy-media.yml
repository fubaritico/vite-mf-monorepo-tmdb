name: Deploy Media to Netlify

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Check if files changed
        id: changed
        run: |
          PARENT=$(git log -1 --format=%P HEAD | awk '{print $1}')
          if [ -z "$PARENT" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --quiet $PARENT HEAD -- apps/media/ packages/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Netlify CLI
        run: pnpm install -g netlify-cli

      - name: Deploy to Netlify (Production)
        if: steps.changed.outputs.changed == 'true'
        run: netlify deploy --prod --dir=apps/media/dist --site=$NETLIFY_SITE_ID_MEDIA --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_MEDIA: ${{ secrets.NETLIFY_SITE_ID_MEDIA }}
