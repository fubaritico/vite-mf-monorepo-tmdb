# ============================================================================
# Netlify Configuration - Host Application
# ============================================================================
# This file configures the deployment of the HOST application on Netlify.
# The host orchestrates the micro-frontend architecture by loading remotes.
#
# Documentation: https://docs.netlify.com/configure-builds/file-based-configuration/
# ============================================================================

[build]
  # Build from monorepo root to access all packages
  base = ""

  # Build command: install deps, build packages, then build host
  command = "pnpm install && pnpm build:packages && cd apps/host && pnpm build"

  # Output directory for the built application
  publish = "apps/host/dist"

# Node.js and pnpm versions (must match package.json engines)
[build.environment]
  NODE_VERSION = "22.11.0"
  PNPM_VERSION = "10.8.1"
  NPM_FLAGS = "--legacy-peer-deps"

# ============================================================================
# SPA Routing Configuration
# ============================================================================
# Redirect all routes to index.html for client-side routing (React Router)
# This ensures deep links work correctly in production
# ============================================================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
